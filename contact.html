<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Contact Us - Karate Academy</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        nav {
            background-color: #111;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid rgb(238, 136, 3);
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav a:hover {
            color: rgb(238, 136, 3);
        }
        .contact-container {
            max-width: 600px;
            margin: 50px auto;
            background: rgba(20, 20, 20, 0.9);
            padding: 30px;
            border-radius: 10px;
            border: 2px solid rgb(238, 136, 3);
            position: relative;
            z-index: 5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .contact-container h1 {
            color: rgb(238, 136, 3);
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #bbb;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: rgb(238, 136, 3);
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: rgb(238, 136, 3);
            color: #000;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover {
            background-color: rgb(255, 160, 20);
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">HOME</a>
        <a href="gallery.html">GALLERY</a>
        <a href="contact.html" style="color:rgb(238,136,3);">CONTACT</a>
        <a href="profile.html">PROFILE</a>
    </nav>

    <div class="contact-container">
        <h1>Send Us a Message</h1>
        <form id="contactForm">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="contactName" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="contactEmail" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="contactMessage" rows="5" required placeholder="I am interested in joining the beginner classes..."></textarea>
            </div>
            <button type="submit" class="submit-btn" id="submitBtnId">Send Message to Sensei</button>
        </form>
    </div>

    <!-- Background Animation & Footer -->
    <script src="bg.js"></script>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtnId');
            const originalText = btn.innerText;
            btn.innerText = "Sending safely...";
            btn.disabled = true;
            
            const payload = {
                name: document.getElementById('contactName').value.trim(),
                email: document.getElementById('contactEmail').value.trim(),
                message: document.getElementById('contactMessage').value.trim()
            };

            try {
                const res = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.success) {
                    alert('Thanks! Your message has been sent directly to the Admin Dashboard Inbox.');
                    document.getElementById('contactForm').reset();
                } else {
                    alert('Error sending message: ' + data.error);
                }
            } catch (err) {
                console.error(err);
                alert("Server connection failed. Is the backend running?");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
