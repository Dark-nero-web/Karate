<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile - Shotokan Karate Academy</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000000;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    @keyframes bgGradient {
      0% {
        background-position: 0% 50%;
      }

      25% {
        background-position: 50% 25%;
      }

      50% {
        background-position: 100% 50%;
      }

      75% {
        background-position: 50% 75%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .profile-container {
      background-color: rgba(26, 26, 26, 0.95);
      padding: 40px;
      border: 2px solid rgba(255, 251, 0, 0.5);
      width: 100%;
      max-width: 500px;
      border-radius: 12px;
      color: white;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
    }

    .profile-container h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 32px;
      color: rgb(255, 251, 0);
      border-bottom: 1px solid rgba(255, 251, 0, 0.3);
      padding-bottom: 15px;
    }

    .profile-details {
      font-size: 16px;
      line-height: 2;
    }

    .profile-details p {
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 15px;
      border-radius: 5px;
      border-left: 4px solid rgb(238, 136, 3);
      margin-bottom: 15px;
    }

    .profile-details strong {
      color: #ddd;
      display: inline-block;
      width: 120px;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    .action-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      transition: 0.3s;
      text-decoration: none;
    }

    .btn-home {
      background-color: #333;
      color: white;
      border: 1px solid #555;
    }

    .btn-home:hover {
      background-color: #444;
      transform: scale(1.05);
    }

    .btn-logout {
      background-color: #d32f2f;
      color: white;
    }

    .btn-logout:hover {
      background-color: #f44336;
      transform: scale(1.05);
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .avatar-wrapper {
      text-align: center;
      margin-bottom: 25px;
      position: relative;
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid rgb(238, 136, 3);
      object-fit: cover;
      background-color: #333;
      cursor: pointer;
      display: inline-block;
      transition: 0.3s;
    }

    .profile-avatar:hover {
      opacity: 0.8;
      border-color: rgb(255, 251, 0);
    }

    .avatar-upload-input {
      display: none;
    }

    .avatar-hint {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-top: 8px;
    }

    .not-logged-in {
      display: none;
      text-align: center;
    }

    .not-logged-in p {
      color: #ffaa00;
      font-size: 18px;
    }

    @media screen and (max-width: 480px) {
      .profile-container {
        padding: 20px;
        margin: 15px;
        width: 90%;
      }
      .btn-group {
        flex-direction: column;
      }
      .profile-details p {
        font-size: 14px;
        word-break: break-all;
      }
    }
  </style>
</head>

<body>

  <div class="profile-container" id="mainContainer">
    <h1>My Profile</h1>

    <div class="avatar-wrapper">
      <img
        src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>"
        id="profileAvatar" class="profile-avatar" alt="Profile Photo"
        onclick="document.getElementById('avatarUpload').click();" title="Upload Photo">
      <input type="file" id="avatarUpload" class="avatar-upload-input" accept="image/*"
        onchange="handleAvatarUpload(event)">
      <span class="avatar-hint">Click image to upload photo</span>
    </div>

    <div class="profile-details" id="profileContent">
      <!-- User details injected here via JS -->
    </div>

    <div class="btn-group">
      <a href="index.html" class="action-btn btn-home">Back to Home</a>
      <button onclick="logoutUser()" class="action-btn btn-logout">Logout</button>
    </div>
  </div>

  <div class="profile-container not-logged-in" id="errorContainer">
    <h1>Access Denied</h1>
    <p>You must be logged in to view your profile.</p>
    <div class="btn-group">
      <a href="login.html" class="action-btn btn-logout" style="background-color:rgb(238, 136, 3); color:black;">Go to
        Login</a>
      <a href="index.html" class="action-btn btn-home">Back to Home</a>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      renderProfile();
    });

    async function renderProfile() {
      const username = localStorage.getItem('currentUser');
      const mainContainer = document.getElementById('mainContainer');
      const errorContainer = document.getElementById('errorContainer');

      if (!username) {
        mainContainer.style.display = 'none';
        errorContainer.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/profile/' + username);
        const data = await res.json();
        if (!data.success) {
          mainContainer.style.display = 'none';
          errorContainer.style.display = 'block';
          return;
        }

        const userData = data.user;
        const profileContent = document.getElementById('profileContent');
        const profileAvatar = document.getElementById('profileAvatar');

        if (userData.profileImage) {
          profileAvatar.src = userData.profileImage;
        }

        profileContent.innerHTML = `
          <p><strong>Username:</strong> ${userData.username}</p>
          <p><strong>Email:</strong> ${userData.email}</p>
          <p><strong>Phone:</strong> ${userData.phone}</p>
          <p><strong>Country:</strong> ${userData.country}</p>
          <p><strong>Registration status:</strong> Active Student</p>
        `;
      } catch (err) {
        console.error(err);
        mainContainer.style.display = 'none';
        errorContainer.style.display = 'block';
      }
    }

    function logoutUser() {
      localStorage.removeItem('currentUser');
      alert("You have been logged out successfully.");
      window.location.href = "index.html";
    }

    function handleAvatarUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function (e) {
        const dataUrl = e.target.result;
        document.getElementById('profileAvatar').src = dataUrl;

        const username = localStorage.getItem('currentUser');
        if (username) {
          try {
            await fetch('/api/profile/' + username + '/avatar', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ profileImage: dataUrl })
            });
          } catch(err) { console.error("Failed to upload avatar", err); }
        }
      };
      reader.readAsDataURL(file);
    }
  </script>

  <script src="bg.js"></script>
</body>

</html>
