<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Gallery - Karate Academy</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        nav {
            background-color: #111;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid rgb(238, 136, 3);
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav a:hover {
            color: rgb(238, 136, 3);
        }
        .header-title {
            text-align: center;
            color: rgb(238, 136, 3);
            margin: 40px 0 10px;
            font-size: 36px;
        }
        .header-desc {
            text-align: center;
            color: #bbb;
            margin-bottom: 40px;
        }
        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            grid-gap: 20px;
            position: relative;
            z-index: 5;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid #333;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            aspect-ratio: 4 / 3;
        }
        .gallery-item:hover {
            transform: scale(1.03);
            border-color: rgb(238, 136, 3);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s;
        }
        /* Lightbox Styles */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border: 3px solid rgb(238, 136, 3);
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(238, 136, 3, 0.5);
        }
        #lightbox:target {
            display: flex;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 60px;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close-btn:hover {
            color: rgb(238, 136, 3);
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">HOME</a>
        <a href="gallery.html" style="color:rgb(238,136,3);">GALLERY</a>
        <a href="profile.html">PROFILE</a>
    </nav>

    <h1 class="header-title">Karate Academy Gallery</h1>
    <p class="header-desc">Memories, Tournaments, and Training Moments</p>

    <div class="gallery-container">
        <a href="#lightbox" class="gallery-item" onclick="openLightbox('karate_dojo.png')">
            <img src="img/karate_dojo.png" alt="Dojo Training Area">
        </a>
        <a href="#lightbox" class="gallery-item" onclick="openLightbox('sunset_karate.png')">
            <img src="img/sunset_karate.png" alt="Master High Kick on Beach">
        </a>
        <a href="#lightbox" class="gallery-item" onclick="openLightbox('kumite_sparing.png')">
            <img src="img/kumite_sparing.png" alt="Kumite Tournament Sparring">
        </a>
    </div>

    <!-- Lightbox Container -->
    <div id="lightbox">
        <a href="#" class="close-btn">&times;</a>
        <img id="lightbox-img" src="" alt="Full Screen">
    </div>

    <!-- Background Matrix Kanajis -->
    <script src="bg.js"></script>

    <script>
        function openLightbox(imgSrc) {
            document.getElementById('lightbox-img').src = imgSrc;
        }
    </script>
</body>
</html>
